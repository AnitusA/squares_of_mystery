<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hall - Square of Mysteries</title>
  <script src="auth.js"></script>
  <script>
    SOM_AUTH.requireRole('hall');
  </script>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #172554, #020617 70%);
      color: #fff;
      font-family: Segoe UI, Arial, sans-serif;
    }
    .screen {
      width: min(92vw, 700px);
      padding: 32px;
      border-radius: 18px;
      background: rgba(7, 16, 41, 0.92);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      text-align: center;
    }
    .label { color: #9fb3d0; text-transform: uppercase; letter-spacing: 0.18em; font-size: 12px; }
    .num { font-size: clamp(72px, 18vw, 140px); line-height: 1; font-weight: 800; margin: 12px 0 8px; }
    .text { font-size: clamp(22px, 4vw, 34px); font-weight: 600; }
    .meta { margin-top: 16px; color: #b9c8e3; font-size: 14px; }
    .waiting { color: #9fb3d0; font-size: 22px; }
    .board {
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(11, minmax(0, 1fr));
      gap: 6px;
    }
    .tile {
      min-height: 54px;
      border-radius: 10px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      position: relative;
      overflow: hidden;
    }
    .tile .num {
      position: absolute;
      top: 6px;
      left: 8px;
      font-size: 12px;
      color: #cbd5e1;
      font-weight: 700;
    }
    .coins {
      position: absolute;
      right: 6px;
      bottom: 6px;
      display: flex;
      gap: 3px;
      flex-wrap: wrap;
      justify-content: flex-end;
      max-width: 75%;
    }
    .coin {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.18);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: #fff;
      font-weight: 700;
    }
    .leaderboard-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      margin: 8px 0;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .leaderboard-coin {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #fff;
      font-weight: 700;
      flex-shrink: 0;
    }
    .leaderboard-info {
      flex: 1;
      min-width: 0;
    }
    .leaderboard-name {
      font-weight: 600;
      font-size: 14px;
    }
    .leaderboard-pos {
      font-size: 12px;
      color: #9fb3d0;
      margin-top: 2px;
    }
    .leaderboard-points {
      font-size: 20px;
      font-weight: 700;
      color: #60a5fa;
    }
  </style>
</head>
<body>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;width:min(98vw,1200px);margin:0 auto;padding:24px;align-items:start">
    <div class="screen">
      <div class="label">Current Tile</div>
      <div id="waiting" class="waiting">Waiting for the latest tile update...</div>
      <div id="display" hidden>
        <div class="num" id="tileNum">-</div>
        <div class="text" id="tileText">-</div>
        <div class="meta" id="tileMeta">-</div>
      </div>
      <div id="board" class="board"></div>
    </div>
    <div class="screen">
      <div class="label">Leaderboard</div>
      <div id="leaderboard" style="margin-top:16px"></div>
    </div>
  </div>

  <script>
    const waitingEl = document.getElementById('waiting');
    const displayEl = document.getElementById('display');
    const tileNumEl = document.getElementById('tileNum');
    const tileTextEl = document.getElementById('tileText');
    const tileMetaEl = document.getElementById('tileMeta');
    const boardEl = document.getElementById('board');
    const BOARD_SIZE = 67;
    const stateKey = 'squares_state_v2';

    function render(payload) {
      if (!payload) return;
      waitingEl.hidden = true;
      displayEl.hidden = false;
      tileNumEl.textContent = payload.pos ?? '-';
      tileTextEl.textContent = payload.status === 'completed'
        ? (payload.type ?? '-')
        : 'Task hidden until completed';
      tileMetaEl.textContent = `${payload.team ?? 'Team'} · ${new Date(payload.ts || Date.now()).toLocaleTimeString()}`;
    }

    function readGameState() {
      try {
        return JSON.parse(localStorage.getItem(stateKey) || '{}');
      } catch (error) {
        return {};
      }
    }

    function renderBoard() {
      const state = readGameState();
      const teams = Array.isArray(state.teams) ? state.teams : [];
      boardEl.innerHTML = '';
      for (let pos = 1; pos <= BOARD_SIZE; pos++) {
        const tile = document.createElement('div');
        tile.className = 'tile';
        const coins = teams
          .filter(team => (team.pos || 0) === pos)
          .map(team => `<span class="coin" title="${team.name}" style="background:${team.color || '#64748b'}">${team.name.slice(0,1).toUpperCase()}</span>`)
          .join('');
        tile.innerHTML = `<div class="num">${pos}</div>${coins ? `<div class="coins">${coins}</div>` : ''}`;
        boardEl.appendChild(tile);
      }
    }

    function renderLeaderboard() {
      const state = readGameState();
      const leaderboardEl = document.getElementById('leaderboard');
      const teams = Array.isArray(state.teams) ? state.teams : [];
      
      leaderboardEl.innerHTML = '';
      if (!teams.length) {
        leaderboardEl.innerHTML = '<div style="color:#9fb3d0;font-size:14px">No teams yet</div>';
        return;
      }
      
      // Sort by points descending
      const sorted = [...teams].sort((a, b) => (b.points || 0) - (a.points || 0));
      
      sorted.forEach((team, index) => {
        const item = document.createElement('div');
        item.className = 'leaderboard-item';
        const medalEmoji = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : '';
        item.innerHTML = `
          <div class="leaderboard-coin" style="background:${team.color || '#64748b'}">${team.name.slice(0,1).toUpperCase()}</div>
          <div class="leaderboard-info">
            <div class="leaderboard-name">${medalEmoji} ${team.name}</div>
            <div class="leaderboard-pos">Pos: ${team.pos || 0}</div>
          </div>
          <div class="leaderboard-points">${team.points || 0}</div>
        `;
        leaderboardEl.appendChild(item);
      });
    }

    function readLatest() {
      try {
        const raw = localStorage.getItem('som_latest_event_v1');
        if (!raw) return;
        render(JSON.parse(raw));
      } catch (error) {
        // ignore malformed storage
      }
    }

    readLatest();
    renderBoard();
    window.addEventListener('storage', (event) => {
      if (event.key === 'som_latest_event_v1' && event.newValue) {
        try {
          render(JSON.parse(event.newValue));
        } catch (error) {
          // ignore malformed storage
        }
      }
      if (event.key === stateKey) {
        renderBoard();
      }
    });

    setInterval(readLatest, 1000);
    setInterval(renderBoard, 1000);

  </script>
</body>
</html>
