<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hall - Square of Mysteries</title>
  <script>
    // Firebase config - loaded before SDK scripts
    const firebaseConfig = {
      apiKey: "AIzaSyDToHas8Id_5BiotcRirE222DR8ki93b88",
      authDomain: "squares-of-mystery.firebaseapp.com",
      projectId: "squares-of-mystery",
      storageBucket: "squares-of-mystery.firebasestorage.app",
      messagingSenderId: "91483191813",
      appId: "1:91483191813:web:700f71b3fc9178f5823a6c",
      measurementId: "G-5D2BNNHLQX"
    };
    
    const DB_PATHS = {
      gameState: 'gameState',
      latestEvent: 'latestEvent'
    };
  </script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #172554, #020617 70%);
      color: #fff;
      font-family: Segoe UI, Arial, sans-serif;
    }
    .screen {
      width: min(92vw, 700px);
      padding: 32px;
      border-radius: 18px;
      background: rgba(7, 16, 41, 0.92);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      text-align: center;
    }
    .task-visual {
      width: min(72vw, 320px);
      height: min(72vw, 320px);
      margin: 6px auto 14px;
      display: grid;
      place-items: center;
      border-radius: 28px;
      background: radial-gradient(circle at top, rgba(255,255,255,0.14), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
    }
    .task-icon {
      width: min(54vw, 220px);
      height: min(54vw, 220px);
      object-fit: contain;
      filter: drop-shadow(0 0 16px rgba(255,255,255,0.18));
      opacity: 1;
      transform: translateZ(0);
    }
    .task-visual.flicker .task-icon {
      animation: cricketReviewBeat 1.4s ease-in-out infinite;
    }
    @keyframes cricketReviewBeat {
      0% { opacity: 1; transform: scale(1); filter: drop-shadow(0 0 10px rgba(255,255,255,0.12)); }
      8% { opacity: 0.55; transform: scale(0.98); }
      14% { opacity: 1; transform: scale(1.06); filter: drop-shadow(0 0 20px rgba(255,255,255,0.24)); }
      22% { opacity: 0.7; transform: scale(1.01); }
      30% { opacity: 1; transform: scale(1.08); filter: drop-shadow(0 0 24px rgba(255,255,255,0.28)); }
      42% { opacity: 0.95; transform: scale(1.01); }
      100% { opacity: 1; transform: scale(1); filter: drop-shadow(0 0 10px rgba(255,255,255,0.12)); }
    }
    .label { color: #9fb3d0; text-transform: uppercase; letter-spacing: 0.18em; font-size: 12px; }
    .num { font-size: clamp(72px, 18vw, 140px); line-height: 1; font-weight: 800; margin: 12px 0 8px; }
    .text { font-size: clamp(22px, 4vw, 34px); font-weight: 600; }
    .meta { margin-top: 16px; color: #b9c8e3; font-size: 14px; }
    .waiting { color: #9fb3d0; font-size: 22px; }
    .board {
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(11, minmax(0, 1fr));
      gap: 6px;
    }
    .tile {
      min-height: 54px;
      border-radius: 10px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      position: relative;
      overflow: hidden;
    }
    .tile .num {
      position: absolute;
      top: 6px;
      left: 8px;
      font-size: 12px;
      color: #cbd5e1;
      font-weight: 700;
    }
    .coins {
      position: absolute;
      right: 6px;
      bottom: 6px;
      display: flex;
      gap: 3px;
      flex-wrap: wrap;
      justify-content: flex-end;
      max-width: 75%;
    }
    .coin {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.18);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: #fff;
      font-weight: 700;
    }
    .leaderboard-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      margin: 8px 0;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .leaderboard-coin {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #fff;
      font-weight: 700;
      flex-shrink: 0;
    }
    .leaderboard-info {
      flex: 1;
      min-width: 0;
    }
    .leaderboard-name {
      font-weight: 600;
      font-size: 14px;
    }
    .leaderboard-pos {
      font-size: 12px;
      color: #9fb3d0;
      margin-top: 2px;
    }
    .leaderboard-points {
      font-size: 20px;
      font-weight: 700;
      color: #60a5fa;
    }
  </style>
</head>
<body>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;width:min(98vw,1200px);margin:0 auto;padding:24px;align-items:start">
    <div class="screen">
      <div class="label">Current Tile</div>
      <div id="waiting" class="waiting">Waiting for the latest tile update...</div>
      <div id="display" hidden>
        <div class="num" id="tileNum">-</div>
        <div class="text" id="tileText">-</div>
        <div class="meta" id="tileMeta">-</div>
      </div>
      <div id="board" class="board"></div>
    </div>
    <div class="screen">
      <div id="taskVisual" class="task-visual">
        <img id="taskIcon" class="task-icon" alt="Task symbol" />
      </div>
      <div class="label">Leaderboard</div>
      <div id="leaderboard" style="margin-top:16px"></div>
    </div>
  </div>

  <script>
    // ===== HALL APP (Combined with Firebase Config) =====
    (() => {
      const waitingEl = document.getElementById('waiting');
      const displayEl = document.getElementById('display');
      const taskVisualEl = document.getElementById('taskVisual');
      const taskIconEl = document.getElementById('taskIcon');
      const tileNumEl = document.getElementById('tileNum');
      const tileTextEl = document.getElementById('tileText');
      const tileMetaEl = document.getElementById('tileMeta');
      const boardEl = document.getElementById('board');
      const BOARD_SIZE = 67;

      let db = null;
      try {
        const fbApp = firebase.initializeApp(firebaseConfig);
        db = firebase.database(fbApp);
      } catch (error) {
        console.log('Firebase not available');
      }

      function getTaskAsset(taskType) {
        const symbolMap = {
          dare: 'symbols/devil.png',
          treasure: 'symbols/treasure.png',
          hex: 'symbols/sword.png',
          snake: 'symbols/mine.png',
          quiz: 'symbols/quiz.png'
        };
        return symbolMap[taskType?.toLowerCase()] || '';
      }

      function render(payload) {
        if (!payload) return;
        waitingEl.hidden = true;
        displayEl.hidden = false;
        const taskType = payload.type ?? '-';
        const taskAsset = getTaskAsset(taskType);
        taskVisualEl.classList.add('flicker');
        if (taskAsset) {
          taskIconEl.src = taskAsset;
          taskIconEl.alt = `${taskType} symbol`;
          taskIconEl.hidden = false;
        } else {
          taskIconEl.hidden = true;
        }
        tileNumEl.textContent = payload.pos ?? '-';
        const status = payload.status ? ` (${payload.status})` : '';
        tileTextEl.textContent = `${taskType}${status}`;
        tileMetaEl.textContent = `${payload.team ?? 'Team'} · ${new Date(payload.ts || Date.now()).toLocaleTimeString()}`;
      }

      function getLatestEvent(sharedState) {
        if (sharedState && sharedState.latestEvent) return sharedState.latestEvent;
        if (sharedState && Array.isArray(sharedState.history) && sharedState.history.length) {
          const last = sharedState.history[sharedState.history.length - 1];
          return {
            type: last.type,
            text: last.text,
            team: last.team,
            pos: last.pos,
            status: 'completed',
            ts: last.ts
          };
        }
        return null;
      }

      function renderBoard(state) {
        const teams = Array.isArray(state?.teams) ? state.teams : [];
        boardEl.innerHTML = '';
        for (let pos = 1; pos <= BOARD_SIZE; pos++) {
          const tile = document.createElement('div');
          tile.className = 'tile';
          const coins = teams
            .filter(team => (team.pos || 0) === pos)
            .map(team => `<span class="coin" title="${team.name}" style="background:${team.color || '#64748b'}">${team.name.slice(0,1).toUpperCase()}</span>`)
            .join('');
          tile.innerHTML = `<div class="num">${pos}</div>${coins ? `<div class="coins">${coins}</div>` : ''}`;
          boardEl.appendChild(tile);
        }
      }

      function renderLeaderboard(state) {
        const leaderboardEl = document.getElementById('leaderboard');
        const teams = Array.isArray(state?.teams) ? state.teams : [];
        
        leaderboardEl.innerHTML = '';
        if (!teams.length) {
          leaderboardEl.innerHTML = '<div style="color:#9fb3d0;font-size:14px">No teams yet</div>';
          return;
        }
        
        const sorted = [...teams].sort((a, b) => (b.points || 0) - (a.points || 0));
        
        sorted.forEach((team, index) => {
          const item = document.createElement('div');
          item.className = 'leaderboard-item';
          const medalEmoji = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : '';
          const pointsValue = team.points || 0;
          item.innerHTML = `
            <div class="leaderboard-coin" style="background:${team.color || '#64748b'}">${team.name.slice(0,1).toUpperCase()}</div>
            <div class="leaderboard-info">
              <div class="leaderboard-name">${medalEmoji} ${team.name}</div>
              <div class="leaderboard-pos">Pos: ${team.pos || 0}</div>
            </div>
            <div class="leaderboard-points">${pointsValue}</div>
          `;
          leaderboardEl.appendChild(item);
        });
      }

      function renderSharedState(state) {
        if (!state) state = {teams: [], board: []};
        render(getLatestEvent(state));
        renderBoard(state);
        renderLeaderboard(state);
      }

      function setupFirebaseListeners() {
        if (!db) {
          console.log('Firebase not initialized, falling back to polling');
          setInterval(readLatest, 2000);
          return;
        }

        db.ref(DB_PATHS.gameState).on('value', (snapshot) => {
          if (snapshot.exists()) {
            const state = snapshot.val();
            renderSharedState(state || {});
          } else {
            console.log('No gameState data in Firebase yet');
            renderSharedState({teams: [], board: []});
          }
        }, (error) => {
          console.log('Firebase error reading gameState:', error.message);
          renderSharedState({teams: [], board: []});
        });

        db.ref(DB_PATHS.latestEvent).on('value', (snapshot) => {
          if (snapshot.exists()) {
            render(snapshot.val());
          }
        });
      }

      async function readLatest() {
        try {
          if (!db) {
            console.log('Firebase DB not available');
            renderSharedState({teams: [], board: []});
            return;
          }
          const snapshot = await db.ref(DB_PATHS.gameState).once('value');
          if (snapshot.exists()) {
            renderSharedState(snapshot.val() || {teams: [], board: []});
          } else {
            console.log('No initial data found in Firebase');
            renderSharedState({teams: [], board: []});
          }
        } catch (error) {
          console.log('Error reading latest state:', error.message);
          renderSharedState({teams: [], board: []});
        }
      }

      setupFirebaseListeners();
      readLatest();
    })();
  </script>
</body>
</html>
