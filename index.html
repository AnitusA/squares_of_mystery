<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Square of Mysteries</title>
  <link rel="stylesheet" href="styles.css" />
  <script>
    // ===== AUTH MODULE =====
    (() => {
      const AUTH_KEY = 'som_auth_role_v1';
      function getRole() { return sessionStorage.getItem(AUTH_KEY) || ''; }
      function setRole(role) { sessionStorage.setItem(AUTH_KEY, role); }
      function logout() { sessionStorage.removeItem(AUTH_KEY); }
      function requireRole(expectedRole, loginPath = 'login.html') {
        if (getRole() !== expectedRole) {
          window.location.replace(loginPath + '?next=' + encodeURIComponent(window.location.pathname.split('/').pop() || 'index.html'));
          return false;
        }
        return true;
      }
      window.SOM_AUTH = { getRole, setRole, logout, requireRole };
    })();

    SOM_AUTH.requireRole('admin');
  </script>
</head>
<body>
  <div style="position:fixed;top:12px;right:12px;z-index:10">
    <button id="logoutBtn" style="padding:8px 12px">Logout</button>
  </div>
  <header>
    <h1>Square of Mysteries (67 tiles)</h1>
  </header>

  <main>
    <section id="admin">
      <h2>Admin Panel</h2>
      <div class="admin-row">
        <div>
          <h3>Teams</h3>
          <ul id="teamList"></ul>
          <input id="teamName" placeholder="Team name" />
          <input id="teamMembers" placeholder="Members (comma-separated)" />
          <select id="teamColor"></select>
          <button id="addTeam">Add Team</button>
        </div>
      </div>
      <div class="admin-row">
        <button id="resetBoard">Reset / Randomize Board</button>
        <label>Saved state: <span id="savedState">—</span></label>
      </div>
      <div class="admin-row">
        <h3>Manual point assign</h3>
        <select id="assignTeam"></select>
        <button id="randomAssignTeam">Random Team</button>
        <input id="assignPoints" type="number" min="1" max="10" placeholder="1-10" />
        <button id="assignBtn">Give Points</button>
        <button id="takePointsBtn">Take Points</button>
      </div>
    </section>

    <section id="game">
      <h2>Game</h2>
      <div class="game-top">
        <div>Current turn: <strong id="currentTeam">—</strong></div>
        <div style="display:flex;gap:8px;align-items:center">
          <label class="small">Set turn to:</label>
          <select id="turnTeam" style="width:160px"></select>
          <button id="setTurnBtn">Set Turn</button>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <label class="small">Manual dice (enter result):</label>
          <input id="moveSteps" placeholder="e.g. 4" style="width:80px" />
          <button id="moveBtn">Move</button>
        </div>
        <div>Last move: <span id="dice">-</span></div>
      </div>
      <div id="board"></div>
      <aside id="teamsPanel">
        <h3>Teams</h3>
        <ul id="teamsStatus"></ul>
      </aside>

      <aside id="winnersPanel" style="margin-top:12px;padding:8px;background:#fff;border-radius:8px;">
        <h3>Winners</h3>
        <ol id="winnersList"></ol>
      </aside>
    </section>
    
    <section id="hallSection">
      <h2>Hall</h2>
      <p class="small">Recent events (duplicates shown at most 3 times)</p>
      <div id="hallList"></div>
      <div class="admin-row">
        <button id="clearHall">Clear Hall</button>
      </div>
    </section>
  </main>

  <div id="modal" class="hidden">
    <div id="modalContent">
      <h3 id="modalTitle"></h3>
      <div id="modalBody"></div>
      <div class="modal-actions">
        <button id="modalComplete" class="hidden">Completed</button>
        <button id="modalNotComplete" class="hidden">Not Completed</button>
        <button id="modalOk">OK</button>
      </div>
    </div>
  </div>

  <script>
// ===== ADMIN APP (Backend Sync) =====
(() => {
  const BOARD_SIZE = 67;
  const STORAGE_KEY = 'squares_state_v2';

  const STATE_API = '/api/state';

  // elements
  const teamListEl = document.getElementById('teamList');
  const addTeamBtn = document.getElementById('addTeam');
  const teamNameInput = document.getElementById('teamName');
  const teamMembersInput = document.getElementById('teamMembers');
  const teamColorSelect = document.getElementById('teamColor');
  const resetBoardBtn = document.getElementById('resetBoard');
  const boardEl = document.getElementById('board');
  const teamsStatusEl = document.getElementById('teamsStatus');
  const currentTeamEl = document.getElementById('currentTeam');
  const turnTeamSelect = document.getElementById('turnTeam');
  const setTurnBtn = document.getElementById('setTurnBtn');
  const rollBtn = document.getElementById('rollBtn');
  const diceEl = document.getElementById('dice');
  const modal = document.getElementById('modal');
  const modalTitle = document.getElementById('modalTitle');
  const modalBody = document.getElementById('modalBody');
  const modalOk = document.getElementById('modalOk');
  const modalComplete = document.getElementById('modalComplete');
  const modalNotComplete = document.getElementById('modalNotComplete');
  const assignTeam = document.getElementById('assignTeam');
  const assignPoints = document.getElementById('assignPoints');
  const assignBtn = document.getElementById('assignBtn');
  const takePointsBtn = document.getElementById('takePointsBtn');
  const randomAssignTeamBtn = document.getElementById('randomAssignTeam');
  const savedStateEl = document.getElementById('savedState');

  // game state
  let state = {
    version: 2,
    board: null,
    teams: [],
    currentIndex: 0,
    history: [],
    winners: [],
    latestEvent: null
  };

  const TEAM_COLORS = [
    { name: 'Red', value: '#ef4444' },
    { name: 'Orange', value: '#f97316' },
    { name: 'Amber', value: '#f59e0b' },
    { name: 'Yellow', value: '#eab308' },
    { name: 'Lime', value: '#84cc16' },
    { name: 'Green', value: '#22c55e' },
    { name: 'Emerald', value: '#10b981' },
    { name: 'Teal', value: '#14b8a6' },
    { name: 'Cyan', value: '#06b6d4' },
    { name: 'Sky', value: '#0ea5e9' },
    { name: 'Blue', value: '#3b82f6' },
    { name: 'Indigo', value: '#6366f1' },
    { name: 'Violet', value: '#8b5cf6' },
    { name: 'Purple', value: '#a855f7' },
    { name: 'Fuchsia', value: '#d946ef' },
    { name: 'Pink', value: '#ec4899' },
    { name: 'Rose', value: '#f43f5e' },
    { name: 'Slate', value: '#64748b' },
    { name: 'Stone', value: '#78716c' },
    { name: 'Zinc', value: '#52525b' }
  ];

  function refreshColorPicker(){
    if(!teamColorSelect) return;
    const usedColors = new Set(state.teams.map(team => team.color).filter(Boolean));
    const availableColors = TEAM_COLORS.filter(color => !usedColors.has(color.value));
    const fallbackColor = availableColors[0] || TEAM_COLORS[0];
    const previousValue = teamColorSelect.value;
    teamColorSelect.innerHTML = '';
    (availableColors.length ? availableColors : TEAM_COLORS).forEach((color, index) => {
      const option = document.createElement('option');
      option.value = color.value;
      option.textContent = color.name;
      option.style.background = color.value;
      option.style.color = '#fff';
      if(index === 0) option.selected = true;
      teamColorSelect.appendChild(option);
    });
    if (availableColors.length && availableColors.some(color => color.value === previousValue)) {
      teamColorSelect.value = previousValue;
    } else {
      teamColorSelect.value = fallbackColor.value;
    }
  }

  function normalizeState(nextState) {
    const normalized = nextState && typeof nextState === 'object' ? nextState : {};
    if (!Array.isArray(normalized.teams)) normalized.teams = [];
    if (!Array.isArray(normalized.history)) normalized.history = [];
    if (!Array.isArray(normalized.winners)) normalized.winners = [];
    if (!normalized.version) normalized.version = 2;
    if (typeof normalized.latestEvent === 'undefined') normalized.latestEvent = null;
    return normalized;
  }

  async function syncStateToServer() {
    try {
      await fetch(STATE_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(state)
      });
    } catch (error) {
      console.log('Server write failed, data saved locally');
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }
  }

  async function loadStateFromServer() {
    try {
      const response = await fetch(STATE_API, { cache: 'no-store' });
      if (!response.ok) return false;
      const nextState = await response.json();
      if (nextState && typeof nextState === 'object') {
        state = normalizeState(nextState);
        return true;
      }
      return false;
    } catch (error) {
      console.log('Server read failed');
      return false;
    }
  }

  function save() {
    state = normalizeState(state);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    updateSavedLabel();
    void syncStateToServer();
  }

  function load() {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) state = normalizeState(JSON.parse(s));
    updateSavedLabel();
  }

  function updateSavedLabel(){ savedStateEl.textContent = localStorage.getItem(STORAGE_KEY) ? 'yes' : 'no' }

  function randInt(min, max){ return Math.floor(Math.random()*(max-min+1))+min }

  function getSelectedTeamIndex(selectEl){
    if (!selectEl || !state.teams.length) return -1;
    const index = Number(selectEl.value);
    return Number.isInteger(index) && index >= 0 && index < state.teams.length ? index : -1;
  }

  function changeTeamPoints(teamIndex, delta){
    const team = state.teams[teamIndex];
    if (!team) return false;
    team.points = Math.max(0, (team.points || 0) + delta);
    save();
    renderTeams();
    renderBoard();
    renderHall();
    return true;
  }

  function resetGame(){
    try { localStorage.removeItem(STORAGE_KEY); } catch (error) { /* ignore */ }
    state = {
      version: 2,
      board: generateBoard(),
      teams: [],
      currentIndex: 0,
      history: [],
      winners: [],
      latestEvent: null
    };
    diceEl.textContent = '-';
    if (moveSteps) moveSteps.value = '';
    try { localStorage.removeItem('som_latest_event_v1'); } catch (error) { /* ignore */ }
    save();
    renderBoard();
    renderTeams();
    renderWinners();
    renderHall();
  }

  function generateBoard(){
    const tiles = Array.from({length:BOARD_SIZE}, (_,i)=>({pos:i+1,type:'empty'}));
    const firstCount = 45;
    const pool = [];
    pool.push(...Array(15).fill('dare'));
    pool.push(...Array(10).fill('quiz'));
    pool.push(...Array(10).fill('hex'));
    pool.push(...Array(10).fill('treasure'));
    
    let valid = false;
    while(!valid){
      const shuffled = [...pool].sort(() => Math.random() - 0.5);
      for(let i=0;i<firstCount;i++) tiles[i].type = shuffled[i];
      
      valid = true;
      for(let i=0;i<firstCount-2;i++){
        if(tiles[i].type === tiles[i+1].type && tiles[i+1].type === tiles[i+2].type){
          valid = false;
          break;
        }
      }
    }

    const snakeRangeIndices = Array.from({length:18},(_,i) => firstCount + i);
    const snakePool = [];
    snakePool.push(...Array(9).fill('snake'));
    snakePool.push(...Array(9).fill('empty'));
    
    valid = false;
    while(!valid){
      const shuffled = [...snakePool].sort(() => Math.random() - 0.5);
      for(let i=0;i<18;i++) tiles[firstCount + i].type = shuffled[i];
      
      valid = true;
      for(let i=firstCount;i<firstCount+16;i++){
        if(tiles[i].type === tiles[i+1].type && tiles[i+1].type === tiles[i+2].type){
          valid = false;
          break;
        }
      }
    }
    
    for(let i=firstCount+18;i<BOARD_SIZE;i++) tiles[i].type = 'empty';

    return tiles;
  }

  function renderBoard(){
    boardEl.innerHTML = '';
    state.board.forEach(tile => {
      const d = document.createElement('div');
      d.className = 'tile type-'+(tile.type||'empty');
      const tileLabel = tile.type === 'snake' ? 'mine' : (tile.type || 'empty');
      const onTileTeams = state.teams
        .filter(team => (team.pos || 0) === tile.pos)
        .map(team => `<span class="team-coin" title="${team.name}" style="background:${team.color || '#64748b'}">${team.name.slice(0, 1).toUpperCase()}</span>`)
        .join('');
      d.innerHTML = `<div class="num">${tile.pos}</div><div>${tileLabel}</div>${onTileTeams ? `<div class="team-coins">${onTileTeams}</div>` : ''}`;
      boardEl.appendChild(d);
    });
  }

  function renderTeams(){
    teamListEl.innerHTML = '';
    teamsStatusEl.innerHTML = '';
    assignTeam.innerHTML = '';
    if (turnTeamSelect) turnTeamSelect.innerHTML = '';
    state.teams.forEach((t,i)=>{
      const li = document.createElement('li');
      li.innerHTML = `<span class="team-swatch" style="background:${t.color || '#64748b'}"></span><span>${t.name} (${t.members.length} members)</span>`;
      teamListEl.appendChild(li);

      const li2 = document.createElement('li');
      li2.innerHTML = `<span class="team-swatch" style="background:${t.color || '#64748b'}"></span><strong>${t.name}</strong> — pos: ${t.pos||0} pts: ${t.points||0}${state.winners.includes(t.name) ? ' <strong>(Winner)</strong>' : ''}`;
      teamsStatusEl.appendChild(li2);

      const opt = document.createElement('option'); opt.value = i; opt.textContent = t.name; assignTeam.appendChild(opt);

      if (turnTeamSelect) {
        const turnOpt = document.createElement('option');
        turnOpt.value = i;
        turnOpt.textContent = t.name;
        if (i === state.currentIndex) turnOpt.selected = true;
        turnTeamSelect.appendChild(turnOpt);
      }
    });
    currentTeamEl.textContent = state.teams[state.currentIndex] ? state.teams[state.currentIndex].name : '—';
    refreshColorPicker();
  }

  function renderWinners(){
    let winnersEl = document.getElementById('winnersList');
    if(!winnersEl) return;
    winnersEl.innerHTML = '';
    if(!state.winners.length){
      winnersEl.innerHTML = '<li class="small">No winners yet</li>';
      return;
    }
    state.winners.forEach((name, index) => {
      const item = document.createElement('li');
      item.innerHTML = `<strong>#${index + 1}</strong> ${name}`;
      winnersEl.appendChild(item);
    });
  }

  function nextTurn(){ state.currentIndex = (state.currentIndex+1) % Math.max(1,state.teams.length); save(); renderTeams(); }

  function setManualTurn(index){
    if (!state.teams.length) return alert('Add teams first');
    const nextIndex = Number(index);
    if (Number.isNaN(nextIndex) || nextIndex < 0 || nextIndex >= state.teams.length) {
      return alert('Select a valid team');
    }
    state.currentIndex = nextIndex;
    save();
    renderTeams();
  }

  function showModal(title, bodyHTML, showComplete=false, onComplete=null, onNotComplete=null){
    modalTitle.textContent = title; modalBody.innerHTML = bodyHTML;
    modal.classList.remove('hidden');
    modalOk.classList.toggle('hidden', showComplete);
    modalOk.onclick = ()=>{ modal.classList.add('hidden'); if(!showComplete) nextTurn(); }
    if(showComplete){
      modalComplete.classList.remove('hidden');
      modalNotComplete.classList.remove('hidden');
      modalComplete.onclick = ()=>{ modal.classList.add('hidden'); if(onComplete) onComplete(); nextTurn(); };
      modalNotComplete.onclick = ()=>{ modal.classList.add('hidden'); if(onNotComplete) onNotComplete(); nextTurn(); };
    } else {
      modalComplete.classList.add('hidden');
      modalNotComplete.classList.add('hidden');
      modalComplete.onclick = null;
      modalNotComplete.onclick = null;
    }
  }

  function handleTile(team, tile){
    let entryText = tile.type;
    if(tile.type === 'dare'){
      state.history.push({type:'dare', text:'dare', team:team.name, pos:tile.pos, ts:Date.now()});
      showModal('Dare', '<p>Offline dare challenge</p><p class="small">Click Completed or Not Completed.</p>', true, ()=>{ team.points = (team.points||0) + 1; updateLatestEvent('dare', team, tile, 'completed'); }, ()=>{ updateLatestEvent('dare', team, tile, 'completed'); });
    } else if(tile.type === 'treasure'){
      state.history.push({type:'treasure', text:'treasure', team:team.name, pos:tile.pos, ts:Date.now()});
      showModal('Treasure', '<p>Offline treasure challenge</p><p class="small">Click Completed or Not Completed.</p>', true, ()=>{ team.points = (team.points||0) + 1; updateLatestEvent('treasure', team, tile, 'completed'); }, ()=>{ updateLatestEvent('treasure', team, tile, 'completed'); });
    } else if(tile.type === 'quiz'){
      state.history.push({type:'quiz', text:'quiz', team:team.name, pos:tile.pos, ts:Date.now()});
      showModal('Quiz', '<p>Offline quiz challenge</p><p class="small">Click Completed or Not Completed.</p>', true, ()=>{ team.points = (team.points||0) + 1; updateLatestEvent('quiz', team, tile, 'completed'); }, ()=>{ updateLatestEvent('quiz', team, tile, 'completed'); });
    } else if(tile.type === 'hex'){
      entryText = `hex`;
      state.history.push({type:'hex', text:'hex', team:team.name, pos:tile.pos, ts:Date.now()});
      showModal('Hex', '<p>Offline hex challenge</p><p class="small">Complete it, then press Completed.</p>', true, ()=>{ updateLatestEvent('hex', team, tile, 'completed'); });
    } else if(tile.type === 'snake'){
      const loss = randInt(5,10);
      entryText = 'snake';
      state.history.push({type:'snake', text:'snake', team:team.name, pos:tile.pos, ts:Date.now()});
      team.points = Math.max(0,(team.points||0) - loss);
      team.pos = Math.max(1, (team.pos || 0) - loss);
      showModal('Snake', `<p>Snake penalty: -${loss} points</p><p class="small">Move back ${loss} spaces, then press Completed to continue.</p>`, true, ()=>{ updateLatestEvent('snake', team, tile, 'completed'); });
    } else {
      entryText = 'Empty';
      state.history.push({type:'empty', text:entryText, team:team.name, pos:tile.pos, ts:Date.now()});
      showModal('Nothing', `<p>Empty tile.</p><p class="small">Press Completed to continue.</p>`, true, ()=>{ updateLatestEvent('empty', team, tile, 'completed'); });
    }
    if((team.pos || 0) >= BOARD_SIZE && !state.winners.includes(team.name) && state.winners.length < 3){
      state.winners.push(team.name);
      alert(`${team.name} reached ${BOARD_SIZE} and won!`);
    }
    updateLatestEvent(tile.type, team, tile, 'pending');
    save(); renderTeams(); renderWinners(); renderHall(); renderBoard();
  }

  function updateLatestEvent(type, team, tile, status){
    state.latestEvent = {
      type,
      text: status === 'completed' ? type : 'hidden',
      team: team.name,
      pos: tile.pos,
      status,
      ts: Date.now(),
      winners: state.winners
    };
    save();
  }

  function renderHall(){
    const listEl = document.getElementById('hallList');
    listEl.innerHTML = '';
    if(!state.history || !state.history.length) return listEl.innerHTML = '<div class="small">No events yet</div>';

    const counts = {}; let shown = 0;
    for(let i = state.history.length - 1; i >= 0 && shown < 200; i--){
      const e = state.history[i];
      const key = e.type + '||' + e.text;
      counts[key] = counts[key] || 0;
      if(counts[key] >= 3) continue;
      counts[key]++;
      const item = document.createElement('div'); item.className = 'hall-item';
      const time = new Date(e.ts).toLocaleTimeString();
      item.innerHTML = `<strong>${e.type}</strong>: ${e.text} <span class="small">— ${e.team} @${e.pos} ${time}</span>`;
      listEl.appendChild(item);
      shown++;
    }
  }

  const moveBtn = document.getElementById('moveBtn');
  const moveSteps = document.getElementById('moveSteps');
  moveBtn.addEventListener('click', ()=>{
    if(!state.teams.length) return alert('Add teams first');
    const steps = Number(moveSteps.value);
    if(!steps || steps <= 0) return alert('Enter a positive number of steps');
    const team = state.teams[state.currentIndex];
    const d = steps; diceEl.textContent = d; moveSteps.value = '';
    team.pos = (team.pos || 0) + d;
    if(team.pos > BOARD_SIZE) team.pos = BOARD_SIZE;
    save(); renderTeams();
    const tile = state.board[team.pos-1];
    handleTile(team, tile);
  });

  addTeamBtn.addEventListener('click', ()=>{
    const name = teamNameInput.value.trim(); if(!name) return alert('Enter name');
    const members = teamMembersInput.value.split(',').map(s=>s.trim()).filter(Boolean);
    const color = teamColorSelect ? teamColorSelect.value : TEAM_COLORS[0].value;
    state.teams.push({name,members,color,points:0,pos:0}); teamNameInput.value=''; teamMembersInput.value=''; if(teamColorSelect) teamColorSelect.value = TEAM_COLORS[0].value; save(); renderTeams(); renderBoard();
  });

  resetBoardBtn.addEventListener('click', ()=>{ if(confirm('Reset the full game? This clears teams, winners, history, and creates a new board.')){ resetGame(); } });

  assignBtn.addEventListener('click', ()=>{
    const idx = getSelectedTeamIndex(assignTeam);
    const pts = Number(assignPoints.value) || 0;
    if (idx < 0) return alert('Select a valid team');
    if (!pts || pts < 1 || pts > 10) return alert('Enter points from 1 to 10');
    changeTeamPoints(idx, pts);
    assignPoints.value = '';
  });

  if (takePointsBtn) {
    takePointsBtn.addEventListener('click', ()=>{
      const idx = getSelectedTeamIndex(assignTeam);
      const pts = Number(assignPoints.value) || 0;
      if (idx < 0) return alert('Select a valid team');
      if (!pts || pts < 1 || pts > 10) return alert('Enter points from 1 to 10');
      changeTeamPoints(idx, -pts);
      assignPoints.value = '';
    });
  }

  if (randomAssignTeamBtn) {
    randomAssignTeamBtn.addEventListener('click', ()=>{
      if (!state.teams.length) return alert('Add teams first');
      const randomIndex = randInt(0, state.teams.length - 1);
      assignTeam.value = String(randomIndex);
      assignTeam.dispatchEvent(new Event('change'));
      assignTeam.focus();
    });
  }

  if (setTurnBtn) {
    setTurnBtn.addEventListener('click', ()=> setManualTurn(turnTeamSelect.value));
  }

  document.getElementById('clearHall').addEventListener('click', ()=>{ if(confirm('Clear hall history?')){ state.history = []; save(); renderHall(); } });

  async function bootstrap() {
    load();
      await loadStateFromServer();
    state = normalizeState(state);
    if(!state.board) state.board = generateBoard();
    if(!Array.isArray(state.winners)) state.winners = [];
    if(!state.latestEvent && Array.isArray(state.history) && state.history.length) {
      const last = state.history[state.history.length - 1];
      state.latestEvent = {
        type: last.type,
        text: last.text,
        team: last.team,
        pos: last.pos,
        status: 'completed',
        ts: last.ts,
        winners: state.winners
      };
    }
    refreshColorPicker();
    const logoutBtn = document.getElementById('logoutBtn');
    if (logoutBtn) {
      logoutBtn.addEventListener('click', () => {
        SOM_AUTH.logout();
        window.location.href = 'login.html';
      });
    }
    renderBoard(); renderTeams(); renderWinners();
    renderHall();
    void syncStateToServer();
  }

  bootstrap();

  window._SOM = {state, save, generateBoard};
})();
  </script>
